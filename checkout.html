<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Samad Bags</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .checkout-section {
            padding: 150px 0 100px;
            background: var(--light);
            min-height: 100vh;
        }

        .checkout-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
        }

        .checkout-form-wrapper {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .checkout-title {
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--light-gray);
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h3 {
            font-size: 1.1rem;
            color: var(--primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-section h3 i {
            color: var(--secondary);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
        }

        /* Order Summary */
        .order-summary {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 100px;
        }

        .order-summary h3 {
            font-size: 1.3rem;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .cart-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 1px solid var(--light-gray);
        }

        .cart-item-image {
            width: 60px;
            height: 60px;
            background: var(--light);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            font-size: 1.5rem;
            overflow: hidden;
        }

        .cart-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .cart-item-qty {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-btn {
            width: 25px;
            height: 25px;
            border: 1px solid var(--light-gray);
            background: var(--white);
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .qty-btn:hover {
            background: var(--secondary);
            color: var(--white);
        }

        .cart-item-price {
            font-weight: 600;
            color: var(--secondary);
        }

        .cart-item-remove {
            color: #e53e3e;
            cursor: pointer;
            transition: var(--transition);
        }

        .cart-item-remove:hover {
            transform: scale(1.2);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--light-gray);
        }

        .summary-row:last-of-type {
            border-bottom: none;
            border-top: 2px solid var(--primary);
            margin-top: 10px;
            padding-top: 15px;
        }

        .summary-label {
            color: var(--gray);
        }

        .summary-value {
            font-weight: 500;
            color: var(--primary);
        }

        .summary-row.total .summary-label,
        .summary-row.total .summary-value {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .pay-btn {
            width: 100%;
            padding: 15px;
            background: var(--secondary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .pay-btn:hover {
            background: var(--primary);
        }

        .secure-payment {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            color: var(--gray);
            font-size: 0.85rem;
        }

        .secure-payment i {
            color: #48bb78;
        }

        .empty-cart {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }

        .empty-cart i {
            font-size: 4rem;
            margin-bottom: 20px;
            color: var(--light-gray);
        }

        @media (max-width: 968px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }

            .order-summary {
                position: static;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-briefcase"></i>
                <span>Samad Bags</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Continue Shopping</a></li>
            </ul>
            <div class="nav-icons">
                <a href="checkout.html" class="cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Checkout Section -->
    <section class="checkout-section">
        <div class="container">
            <div class="checkout-grid">
                <!-- Checkout Form -->
                <div class="checkout-form-wrapper">
                    <h2 class="checkout-title">Checkout</h2>

                    <form id="checkoutForm">
                        <!-- Contact Information -->
                        <div class="form-section">
                            <h3><i class="fas fa-user"></i> Contact Information</h3>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="firstName">First Name *</label>
                                    <input type="text" id="firstName" name="firstName" required>
                                </div>
                                <div class="form-group">
                                    <label for="lastName">Last Name *</label>
                                    <input type="text" id="lastName" name="lastName" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="email">Email Address *</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone Number *</label>
                                <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210" required>
                            </div>
                        </div>

                        <!-- Shipping Address -->
                        <div class="form-section">
                            <h3><i class="fas fa-truck"></i> Shipping Address</h3>
                            <div class="form-group">
                                <label for="address">Street Address *</label>
                                <input type="text" id="address" name="address" required>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="city">City *</label>
                                    <input type="text" id="city" name="city" required>
                                </div>
                                <div class="form-group">
                                    <label for="state">State *</label>
                                    <select id="state" name="state" required>
                                        <option value="">Select State</option>
                                        <option value="Maharashtra">Maharashtra</option>
                                        <option value="Delhi">Delhi</option>
                                        <option value="Karnataka">Karnataka</option>
                                        <option value="Tamil Nadu">Tamil Nadu</option>
                                        <option value="Gujarat">Gujarat</option>
                                        <option value="Rajasthan">Rajasthan</option>
                                        <option value="Telangana">Telangana</option>
                                        <option value="Kerala">Kerala</option>
                                        <option value="Chhattisgarh">Chhattisgarh</option>
                                        <option value="Uttarakhand">Uttarakhand</option>
                                        <option value="Bihar">Bihar</option>
                                        <option value="Kolkata">Kolkata</option>
                                        <option value="Odisha">Odisha</option>
                                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                                        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                                        <option value="Assam">Assam</option>
                                        <option value="Goa">Goa</option>
                                        <option value="Gujarat">Gujarat</option>
                                        <option value="Haryana">Haryana</option>
                                        <option value="Himachal Pradesh">Himachal Pradesh</option>
                                        <option value="Jharkhand">Jharkhand</option>
                                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                                        <option value="Manipur">Manipur</option>
                                        <option value="Meghalaya">Meghalaya</option>
                                        <option value="Mizoram">Mizoram</option>
                                        <option value="Nagaland">Nagaland</option>
                                        <option value="Punjab">Punjab</option>
                                        <option value="Sikkim">Sikkim</option>
                                        <option value="Tripura">Tripura</option>
                                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="pincode">PIN Code *</label>
                                    <input type="text" id="pincode" name="pincode" maxlength="6" required>
                                </div>
                                <div class="form-group">
                                    <label for="country">Country</label>
                                    <input type="text" id="country" name="country" value="India" readonly>
                                </div>
                            </div>
                        </div>

                        <!-- Order Notes -->
                        <div class="form-section">
                            <h3><i class="fas fa-sticky-note"></i> Order Notes (Optional)</h3>
                            <div class="form-group">
                                <textarea id="notes" name="notes" rows="3" placeholder="Special instructions for delivery..."></textarea>
                            </div>
                        </div>
                    </form>
                </div>

                <!-- Order Summary -->
                <div class="order-summary">
                    <h3>Order Summary</h3>

                    <div class="cart-items" id="cartItems">
                        <!-- Cart items will be loaded here -->
                    </div>

                    <div class="summary-row">
                        <span class="summary-label">Subtotal</span>
                        <span class="summary-value" id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Shipping</span>
                        <span class="summary-value" id="shipping">Free</span>
                    </div>
                    <div class="summary-row">
                        <span class="summary-label">Tax (18% GST)</span>
                        <span class="summary-value" id="tax">₹0</span>
                    </div>
                    <div class="summary-row total">
                        <span class="summary-label">Total</span>
                        <span class="summary-value" id="total">₹0</span>
                    </div>

                    <button class="pay-btn" id="payButton" onclick="initiatePayment()">
                        <i class="fas fa-lock"></i>
                        Pay with Razorpay
                    </button>

                    <div class="secure-payment">
                        <i class="fas fa-shield-alt"></i>
                        <span>Secure Payment Powered by Razorpay</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Razorpay SDK -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>

    <script>
        // Load cart from localStorage
        let cart = JSON.parse(localStorage.getItem('samadBagsCart')) || [];

        // Update cart count
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.querySelectorAll('.cart-count').forEach(el => el.textContent = count);
        }

        // Format price in INR
        function formatPrice(amount) {
            return '₹' + (amount / 100).toLocaleString('en-IN');
        }

        // Render cart items
        function renderCart() {
            const cartContainer = document.getElementById('cartItems');

            if (cart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <p>Your cart is empty</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top: 15px;">Continue Shopping</a>
                    </div>
                `;
                document.getElementById('payButton').disabled = true;
                updateSummary(0, 0);
                return;
            }

            cartContainer.innerHTML = cart.map((item, index) => `
                <div class="cart-item" data-index="${index}">
                    <div class="cart-item-image">
                        <i class="fas fa-shopping-bag"></i>
                    </div>
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-qty">
                            <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                        </div>
                    </div>
                    <div class="cart-item-price">${formatPrice(item.price * item.quantity)}</div>
                    <i class="fas fa-times cart-item-remove" onclick="removeItem(${index})"></i>
                </div>
            `).join('');

            updateSummary();
        }

        // Update quantity
        function updateQuantity(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            saveCart();
            renderCart();
        }

        // Remove item
        function removeItem(index) {
            cart.splice(index, 1);
            saveCart();
            renderCart();
        }

        // Save cart to localStorage
        function saveCart() {
            localStorage.setItem('samadBagsCart', JSON.stringify(cart));
            updateCartCount();
        }

        // Update order summary
        function updateSummary() {
            const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            const shipping = subtotal > 1000000 ? 0 : 15000; // Free shipping over ₹10,000
            const tax = Math.round(subtotal * 0.18);
            const total = subtotal + shipping + tax;

            document.getElementById('subtotal').textContent = formatPrice(subtotal);
            document.getElementById('shipping').textContent = shipping === 0 ? 'Free' : formatPrice(shipping);
            document.getElementById('tax').textContent = formatPrice(tax);
            document.getElementById('total').textContent = formatPrice(total);

            return total;
        }

        // Initiate Razorpay Payment
        function initiatePayment() {
            const form = document.getElementById('checkoutForm');

            // Validate form
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const totalAmount = updateSummary();

            // Get form data
            const formData = new FormData(form);
            const customerData = {
                name: formData.get('firstName') + ' ' + formData.get('lastName'),
                email: formData.get('email'),
                phone: formData.get('phone'),
                address: formData.get('address'),
                city: formData.get('city'),
                state: formData.get('state'),
                pincode: formData.get('pincode')
            };

            // Razorpay options
            // ===========================================
            // Razorpay Key ID - From Dashboard (https://dashboard.razorpay.com)
            // ===========================================
            const RAZORPAY_KEY_ID = 'rzp_test_ScaijrskHNmzdx'; // Your Razorpay Test Key ID
            const options = {
                key: RAZORPAY_KEY_ID, // Enter the Key ID generated from the Dashboard
                amount: totalAmount,
                currency: 'INR',
                name: 'Samad Bags',
                description: 'Premium Bags Purchase',
                image: 'https://your-logo-url.png', // Optional: Add your logo URL
                handler: function (response) {
                    // Payment successful
                    handlePaymentSuccess(response, customerData, totalAmount);
                },
                prefill: {
                    name: customerData.name,
                    email: customerData.email,
                    contact: customerData.phone.replace(/\D/g, '')
                },
                notes: {
                    address: `${customerData.address}, ${customerData.city}, ${customerData.state} - ${customerData.pincode}`,
                    order_notes: formData.get('notes') || 'None'
                },
                theme: {
                    color: '#d4a574'
                },
                modal: {
                    ondismiss: function() {
                        console.log('Payment modal closed');
                    }
                }
            };

            const rzp = new Razorpay(options);
            rzp.open();
        }

        // Handle successful payment
        async function handlePaymentSuccess(response, customerData, amount) {
            // Create order details
            const orderDetails = {
                paymentId: response.razorpay_payment_id,
                orderId: 'ORD' + Date.now(),
                amount: amount,
                customer: customerData,
                items: cart,
                status: 'pending'
            };

            // Save order to Firebase
            let orderSaved = false;
            if (typeof OrdersDB !== 'undefined') {
                const result = await OrdersDB.create(orderDetails);
                orderSaved = result.success;
            }

            // Fallback to localStorage if Firebase fails
            if (!orderSaved) {
                const orders = JSON.parse(localStorage.getItem('samadBagsOrders')) || [];
                orders.push({ ...orderDetails, date: new Date().toISOString() });
                localStorage.setItem('samadBagsOrders', JSON.stringify(orders));
            }

            // Clear cart
            cart = [];
            saveCart();

            // Show success message
            alert(`Payment Successful!\n\nPayment ID: ${response.razorpay_payment_id}\nAmount: ${formatPrice(amount)}\n\nThank you for your purchase!`);

            // Redirect to success page or home
            window.location.href = 'index.html';
        }

        // Initialize
        updateCartCount();
        renderCart();

        // Save cart function for product page
        window.addToCart = function(product) {
            const existingItem = cart.find(item => item.id === product.id);
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            saveCart();
        };

        // PIN code validation
        document.getElementById('pincode')?.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
        });

        // Phone validation
        document.getElementById('phone')?.addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^\d\s\-+]/g, '');
        });
    </script>
</body>
</html>
